
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card Catalog — Trivia Quiz</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1c2420;
    --card: #efe3c2;
    --card-shadow: #b9ac86;
    --ink: #21261f;
    --ink-soft: #4b4a3f;
    --mustard: #c89b3c;
    --stamp-red: #a6373b;
    --stamp-green: #3b6e4e;
    --line: rgba(33,38,31,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% 10%, rgba(200,155,60,0.08), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(59,110,78,0.10), transparent 50%),
      var(--bg);
    color: var(--card);
    font-family: 'Libre Franklin', sans-serif;
    min-height: 100vh;
    padding: 32px 16px 60px;
  }
  .wrap{ max-width: 760px; margin: 0 auto; }

  header{ text-align:center; margin-bottom: 20px; }
  .eyebrow{
    font-family:'Special Elite', monospace; letter-spacing: 0.35em; text-transform: uppercase;
    font-size: 11px; color: var(--mustard); margin-bottom: 8px;
  }
  h1{
    font-family: 'Special Elite', monospace; font-size: clamp(28px, 5vw, 40px);
    margin: 0 0 6px; color: var(--card); letter-spacing: 0.01em;
  }
  .sub{ color: rgba(239,227,194,0.6); font-size: 14px; max-width: 480px; margin: 0 auto; }

  .status-bar{
    display:flex; align-items:center; justify-content:center; gap: 8px;
    font-family:'Special Elite', monospace; font-size: 12px; letter-spacing: 0.04em;
    margin: 18px auto 0; padding: 8px 14px; border-radius: 20px; max-width: fit-content;
    background: rgba(239,227,194,0.06); border: 1px solid rgba(239,227,194,0.14);
    cursor: default;
  }
  .status-bar.clickable{ cursor: pointer; }
  .status-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink:0; }
  .status-dot.ok{ background: var(--stamp-green); }
  .status-dot.loading{ background: var(--mustard); animation: pulse 1s infinite ease-in-out; }
  .status-dot.error{ background: var(--stamp-red); }
  .status-dot.off{ background: rgba(239,227,194,0.35); }
  @keyframes pulse{ 0%,100%{ opacity:1; } 50%{ opacity: 0.3; } }

  .tabs{
    display:flex; justify-content:center; gap: 4px; margin: 22px 0 22px;
    border-bottom: 1px solid rgba(239,227,194,0.15);
  }
  .tab{
    font-family:'Special Elite', monospace; background: none; border: none; cursor: pointer;
    color: rgba(239,227,194,0.55); font-size: 14px; letter-spacing: 0.08em; text-transform: uppercase;
    padding: 10px 18px; position: relative; top: 1px;
  }
  .tab.active{ color: var(--mustard); border-bottom: 2px solid var(--mustard); }
  .tab:hover{ color: var(--card); }

  .index-card{
    background: var(--card); color: var(--ink); border-radius: 3px; padding: 22px 24px;
    position: relative; box-shadow: 0 10px 0 -4px var(--card-shadow), 0 14px 28px rgba(0,0,0,0.35);
    background-image: repeating-linear-gradient(to bottom, transparent, transparent 27px, var(--line) 28px);
    margin-bottom: 18px;
  }
  .index-card::before{
    content:""; position:absolute; left: 46px; top:0; bottom:0; width:1px;
    background: rgba(166,55,59,0.28);
  }
  .index-card .content{ margin-left: 24px; }
  .index-card.plain::before{ display:none; }
  .index-card.plain .content{ margin-left: 0; }

  .field{ margin-bottom: 14px; }
  label{
    display:block; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 6px; font-weight: 600;
  }
  input[type=text]{
    width: 100%; font-family: 'Libre Franklin', sans-serif; font-size: 15px;
    padding: 10px 12px; border-radius: 2px; border: 1px solid rgba(33,38,31,0.25);
    background: #fbf7ec; color: var(--ink);
  }
  input[type=text]:focus{ outline: 2px solid var(--mustard); outline-offset: 1px; }
  .hint{ font-size: 12px; color: var(--ink-soft); margin-top: 5px; line-height: 1.5; }
  .hint code{ background: rgba(33,38,31,0.08); padding: 1px 5px; border-radius: 3px; }

  button.primary{
    font-family:'Special Elite', monospace; background: var(--stamp-green); color: #f4ecd8; border: none;
    padding: 11px 20px; border-radius: 2px; cursor: pointer; font-size: 14px; letter-spacing: 0.06em;
    text-transform: uppercase; transition: transform .1s ease;
  }
  button.primary:hover{ transform: translateY(-1px); }
  button.primary:disabled{ background:#8a8a72; cursor:not-allowed; transform:none; }
  button.small-ghost{
    font-family: 'Libre Franklin', sans-serif; font-size: 12px; color: var(--ink-soft);
    background: none; border: 1px solid rgba(33,38,31,0.25); padding: 7px 12px; border-radius: 2px; cursor: pointer;
  }

  .pool-count{
    font-family:'Special Elite', monospace; text-align:center; color: rgba(239,227,194,0.55);
    font-size: 13px; margin: 4px 0 20px; letter-spacing: 0.05em;
  }
  .q-text{ font-size: 15px; line-height: 1.5; }
  .q-ans{ font-size: 12px; color: var(--stamp-green); font-weight:600; margin-top: 6px; }
  .empty-state{
    text-align:center; padding: 40px 20px; color: rgba(239,227,194,0.5);
    font-family: 'Special Elite', monospace; font-size: 14px; line-height: 1.7;
  }
  .empty-state button{ margin-top: 16px; }

  .progress{
    font-family:'Special Elite', monospace; text-align:center; color: var(--mustard);
    font-size: 13px; letter-spacing: 0.08em; margin-bottom: 14px; text-transform: uppercase;
  }
  .quiz-question{ font-size: 17px; line-height: 1.6; margin-bottom: 16px; }
  .blank-input{
    display:inline-block; min-width: 140px; border: none; border-bottom: 2px solid var(--stamp-red);
    background: transparent; font-family:'Special Elite', monospace; font-size: 16px; padding: 2px 4px; color: var(--ink);
  }
  .blank-input:focus{ outline:none; border-bottom-color: var(--stamp-green); }
  .quiz-nav{ display:flex; justify-content: space-between; align-items:center; margin-top: 20px; }

  .stamp{
    position:absolute; top: 14px; right: 18px; font-family:'Special Elite', monospace; font-size: 13px;
    letter-spacing: 0.05em; padding: 4px 10px; border: 2px solid; border-radius: 3px; text-transform: uppercase;
    transform: rotate(-8deg); opacity: 0; animation: stampIn .25s ease forwards;
  }
  .stamp.correct{ color: var(--stamp-green); border-color: var(--stamp-green); }
  .stamp.wrong{ color: var(--stamp-red); border-color: var(--stamp-red); }
  @keyframes stampIn{ 0%{ opacity:0; transform: rotate(-8deg) scale(1.8); } 100%{ opacity:1; transform: rotate(-8deg) scale(1); } }

  .review-answer{ font-size: 13px; margin-top: 8px; }
  .review-answer .correct-text{ color: var(--stamp-green); font-weight:600; }
  .review-answer .wrong-text{ color: var(--stamp-red); text-decoration: line-through; }

  .score-banner{ text-align:center; font-family:'Special Elite', monospace; font-size: 26px; color: var(--mustard); margin: 6px 0 20px; }
  .score-sub{ text-align:center; color: rgba(239,227,194,0.6); font-size: 13px; margin-bottom: 26px; }
  .row-actions{ display:flex; gap: 10px; justify-content:center; margin-top: 22px; flex-wrap: wrap; }
  .loading{ text-align:center; color: rgba(239,227,194,0.5); font-family:'Special Elite', monospace; padding: 30px; }

  .settings-note{ font-size: 13px; line-height: 1.6; color: var(--ink-soft); margin-bottom: 18px; }
  .settings-note code{ background: rgba(33,38,31,0.08); padding: 1px 5px; border-radius: 3px; }
  pre.sample{
    background: rgba(33,38,31,0.06); border: 1px solid rgba(33,38,31,0.15); border-radius: 3px;
    padding: 12px 14px; font-size: 12px; line-height: 1.5; overflow-x: auto; margin: 10px 0 18px;
    color: var(--ink);
  }
  .conn-row{ display:flex; justify-content: space-between; align-items:center; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .conn-detail{ font-size: 13px; color: var(--ink-soft); word-break: break-all; }
  .conn-detail b{ color: var(--ink); }
  .error-box{
    background: rgba(166,55,59,0.1); border: 1px solid rgba(166,55,59,0.4); color: var(--stamp-red);
    padding: 10px 14px; border-radius: 3px; font-size: 13px; margin-bottom: 14px; line-height: 1.5;
  }
  .top-actions{ display:flex; justify-content:flex-end; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Personal Trivia Archive</div>
    <h1>The Card Catalog</h1>
    <p class="sub">Your questions live in a JSON file in GitHub. Edit that file whenever you learn something new — this page just reads it and quizzes you.</p>
  </header>

  <div id="statusBar"></div>

  <div class="tabs">
    <button class="tab active" data-tab="library">Library</button>
    <button class="tab" data-tab="quiz">Quiz</button>
    <button class="tab" data-tab="settings">Settings</button>
  </div>

  <div id="app"><div class="loading">Opening the drawer…</div></div>
</div>

<script>
(function(){
  const CONFIG_KEY = 'trivia_source_url_v1';
  let pool = [];
  let loaded = false;
  let activeTab = 'library';
  let syncState = 'off'; // off | loading | ok | error
  let syncError = '';

  let quiz = null;

  const app = document.getElementById('app');
  const statusBar = document.getElementById('statusBar');
  const tabs = document.querySelectorAll('.tab');
  tabs.forEach(t => t.addEventListener('click', () => goToTab(t.dataset.tab)));

  function goToTab(name){
    activeTab = name;
    tabs.forEach(x => x.classList.toggle('active', x.dataset.tab === name));
    if(activeTab === 'quiz' && (!quiz || quiz.finished)) startQuiz();
    render();
  }

  /* ---------- source URL (per-device, in localStorage) ---------- */
  function getUrl(){ return localStorage.getItem(CONFIG_KEY) || 'https://raw.githubusercontent.com/sama37/quiz/main/trivia-questions.json'; }
  function setUrl(u){ localStorage.setItem(CONFIG_KEY, u); }
  function clearUrl(){ localStorage.removeItem(CONFIG_KEY); }

  function toRawUrl(input){
    // Convert a normal github.com blob link into a raw.githubusercontent.com link, if needed.
    try{
      const u = new URL(input);
      if(u.hostname === 'github.com'){
        const parts = u.pathname.split('/').filter(Boolean); // owner, repo, blob, branch, ...path
        if(parts.length >= 5 && parts[2] === 'blob'){
          const owner = parts[0], repo = parts[1], branch = parts[3];
          const filePath = parts.slice(4).join('/');
          return `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${filePath}`;
        }
      }
      return input;
    }catch(e){ return input; }
  }

  async function loadPool(){
    const url = getUrl();
    if(!url){ pool = []; loaded = true; syncState = 'off'; render(); return; }
    syncState = 'loading'; render();
    try{
      const bustUrl = url + (url.includes('?') ? '&' : '?') + '_=' + Date.now();
      const res = await fetch(bustUrl, { cache: 'no-store' });
      if(!res.ok) throw new Error('Could not load file (HTTP ' + res.status + ')');
      const json = await res.json();
      pool = (Array.isArray(json) ? json : []).map((q, i) => ({
        id: 'q_' + i,
        prompt: q.question || q.prompt || '',
        answer: q.answer || ''
      })).filter(q => q.prompt && q.answer);
      syncState = 'ok'; syncError = '';
    }catch(e){
      syncState = 'error'; syncError = e.message || String(e);
    }
    loaded = true;
    render();
  }

  function shuffle(arr){
    const a = arr.slice();
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i+1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  function startQuiz(){
    const count = Math.min(5, pool.length);
    quiz = { questions: shuffle(pool).slice(0, count), answers: {}, checked: {}, currentIndex: 0, finished: false };
  }
  function normalize(s){ return (s || '').trim().toLowerCase().replace(/\s+/g,' '); }
  function checkCurrent(){
    const q = quiz.questions[quiz.currentIndex];
    quiz.checked[q.id] = normalize(quiz.answers[q.id] || '') === normalize(q.answer);
  }

  function escapeHtml(s){
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  /* ---------- render ---------- */
  function render(){
    renderStatusBar();
    if(!loaded){ app.innerHTML = '<div class="loading">Opening the drawer…</div>'; return; }
    if(activeTab === 'library') renderLibrary();
    else if(activeTab === 'quiz') renderQuiz();
    else renderSettings();
  }

  function renderStatusBar(){
    const url = getUrl();
    let dot = 'off', label = 'Not connected — go to Settings';
    if(url){
      if(syncState === 'loading') { dot = 'loading'; label = 'Loading questions…'; }
      else if(syncState === 'ok') { dot = 'ok'; label = `${pool.length} card${pool.length===1?'':'s'} loaded`; }
      else if(syncState === 'error') { dot = 'error'; label = 'Load failed — tap for details'; }
    }
    statusBar.innerHTML = `<div class="status-bar clickable" id="statusClick"><span class="status-dot ${dot}"></span>${label}</div>`;
    document.getElementById('statusClick').addEventListener('click', () => activeTab === 'settings' ? loadPool() : goToTab('settings'));
  }

  function renderLibrary(){
    const url = getUrl();
    let html = '';

    if(!url){
      html += '<div class="index-card plain"><div class="content">';
      html += '<div class="empty-state" style="padding:10px 0;">No source connected yet.<br>';
      html += '<button class="primary" id="goSettings">Go to Settings</button></div></div></div>';
      app.innerHTML = html;
      document.getElementById('goSettings').addEventListener('click', () => goToTab('settings'));
      return;
    }

    html += '<div class="top-actions"><button class="small-ghost" id="refreshBtn">↻ Refresh</button></div>';

    if(syncState === 'error'){
      html += `<div class="error-box">Couldn't load your questions: ${escapeHtml(syncError)}. Check the URL in Settings, or make sure the repo is public.</div>`;
    }

    html += `<div class="pool-count">${pool.length} card${pool.length===1?'':'s'} in the drawer</div>`;

    if(pool.length === 0 && syncState === 'ok'){
      html += '<div class="empty-state">The file loaded, but it\'s empty.<br>Add some questions to it on GitHub, then refresh.</div>';
    } else {
      pool.forEach(q => {
        html += '<div class="index-card q-card"><div class="content">';
        html += `<div class="q-text">${escapeHtml(q.prompt)}</div>`;
        html += `<div class="q-ans">Answer: ${escapeHtml(q.answer)}</div>`;
        html += '</div></div>';
      });
    }

    app.innerHTML = html;
    document.getElementById('refreshBtn').addEventListener('click', loadPool);
  }

  function renderQuiz(){
    if(!getUrl()){
      app.innerHTML = '<div class="empty-state">Connect your questions file in Settings first.</div>';
      return;
    }
    if(pool.length === 0){
      app.innerHTML = '<div class="empty-state">No cards loaded yet.<br>Add questions to your file on GitHub, then refresh from the Library tab.</div>';
      return;
    }
    if(!quiz) startQuiz();
    if(quiz.finished){ renderResults(); return; }

    const total = quiz.questions.length;
    const q = quiz.questions[quiz.currentIndex];
    const isChecked = q.id in quiz.checked;
    const parts = q.prompt.split('___');

    let questionHtml = escapeHtml(parts[0] || '');
    for(let i = 1; i < parts.length; i++){
      questionHtml += `<input type="text" class="blank-input" id="blankInput" ${isChecked ? 'disabled' : ''} value="${escapeHtml(quiz.answers[q.id] || '')}" placeholder="…" />`;
      questionHtml += escapeHtml(parts[i]);
    }
    if(parts.length === 1){
      questionHtml += ` <input type="text" class="blank-input" id="blankInput" ${isChecked ? 'disabled' : ''} value="${escapeHtml(quiz.answers[q.id] || '')}" placeholder="type answer…" />`;
    }

    let html = '';
    html += `<div class="progress">Card ${quiz.currentIndex + 1} of ${total}</div>`;
    html += '<div class="index-card" style="position:relative;"><div class="content">';
    if(isChecked) html += `<div class="stamp ${quiz.checked[q.id] ? 'correct' : 'wrong'}">${quiz.checked[q.id] ? 'Correct' : 'Try again'}</div>`;
    html += `<div class="quiz-question">${questionHtml}</div>`;
    if(isChecked && !quiz.checked[q.id]) html += `<div class="review-answer">Correct answer: <span class="correct-text">${escapeHtml(q.answer)}</span></div>`;
    html += '<div class="quiz-nav">';
    if(!isChecked){
      html += '<button class="primary" id="checkBtn">Check answer</button>';
    } else {
      const isLast = quiz.currentIndex === total - 1;
      html += `<button class="primary" id="nextBtn">${isLast ? 'See results' : 'Next card'}</button>`;
    }
    html += '</div></div></div>';

    app.innerHTML = html;

    const input = document.getElementById('blankInput');
    if(input && !isChecked){
      input.addEventListener('input', () => { quiz.answers[q.id] = input.value; });
      input.addEventListener('keydown', (e) => { if(e.key === 'Enter') document.getElementById('checkBtn').click(); });
      input.focus();
    }
    const checkBtn = document.getElementById('checkBtn');
    if(checkBtn) checkBtn.addEventListener('click', () => { checkCurrent(); render(); });
    const nextBtn = document.getElementById('nextBtn');
    if(nextBtn) nextBtn.addEventListener('click', () => {
      if(quiz.currentIndex === total - 1) quiz.finished = true; else quiz.currentIndex++;
      render();
    });
  }

  function renderResults(){
    const total = quiz.questions.length;
    const correct = quiz.questions.filter(q => quiz.checked[q.id]).length;
    let html = '';
    html += `<div class="score-banner">${correct} / ${total}</div>`;
    html += `<div class="score-sub">${correct === total ? 'Perfect drawer pull.' : 'Cards to revisit are marked below.'}</div>`;
    quiz.questions.forEach(q => {
      const ok = quiz.checked[q.id];
      html += '<div class="index-card" style="position:relative;"><div class="content">';
      html += `<div class="stamp ${ok ? 'correct' : 'wrong'}">${ok ? 'Correct' : 'Wrong'}</div>`;
      html += `<div class="q-text">${escapeHtml(q.prompt.replace('___', '_____'))}</div>`;
      html += `<div class="review-answer">Your answer: <span class="${ok ? 'correct-text' : 'wrong-text'}">${escapeHtml(quiz.answers[q.id] || '(blank)')}</span>`;
      if(!ok) html += ` &nbsp;·&nbsp; Correct: <span class="correct-text">${escapeHtml(q.answer)}</span>`;
      html += '</div></div></div>';
    });
    html += '<div class="row-actions"><button class="primary" id="retakeBtn">Pull five new cards</button></div>';
    app.innerHTML = html;
    document.getElementById('retakeBtn').addEventListener('click', () => { startQuiz(); render(); });
  }

  function renderSettings(){
    const url = getUrl();
    let html = '';

    html += '<div class="index-card plain"><div class="content">';
    html += '<div class="settings-note">';
    html += 'Put your questions in a JSON file in a <b>public</b> GitHub repo, shaped like this:';
    html += '</div>';
    html += '<pre class="sample">[\n  { "question": "The mitochondria is the ___ of the cell.", "answer": "powerhouse" },\n  { "question": "The largest planet is ___.", "answer": "Jupiter" }\n]</pre>';
    html += '<div class="settings-note">';
    html += 'Then paste either the file\'s normal GitHub link (the one with <code>/blob/</code> in it) or its raw.githubusercontent.com link below — either works. Whenever you edit the file on GitHub and hit Refresh here, the new questions show up.';
    html += '</div>';

    if(url){
      html += `<div class="conn-row"><div class="conn-detail">Reading from: <b>${escapeHtml(url)}</b></div>`;
      html += '<button class="small-ghost" id="disconnectBtn">Disconnect</button></div>';
      if(syncState === 'error') html += `<div class="error-box">${escapeHtml(syncError)}</div>`;
    }

    html += '<div class="field"><label>GitHub file link</label>';
    html += `<input type="text" id="cfgUrl" value="${url ? escapeHtml(url) : ''}" placeholder="https://github.com/you/repo/blob/main/trivia-questions.json" /></div>`;
    html += '<button class="primary" id="saveCfgBtn">Save & load</button>';
    html += '<span id="cfgStatus" style="margin-left:12px; font-size:13px; color: var(--ink-soft);"></span>';
    html += '</div></div>';

    app.innerHTML = html;

    if(url){
      document.getElementById('disconnectBtn').addEventListener('click', () => {
        clearUrl();
        pool = []; syncState = 'off';
        render();
      });
    }

    document.getElementById('saveCfgBtn').addEventListener('click', async () => {
      const raw = document.getElementById('cfgUrl').value.trim();
      const statusEl = document.getElementById('cfgStatus');
      if(!raw){ statusEl.textContent = 'Paste a link first.'; return; }
      const finalUrl = toRawUrl(raw);
      statusEl.textContent = 'Loading…';
      setUrl(finalUrl);
      await loadPool();
      statusEl.textContent = syncState === 'ok' ? `Loaded ${pool.length} cards.` : 'Could not load — see error above.';
      if(syncState === 'ok') goToTab('library');
    });
  }

  loadPool();
})();
</script>
</body>
</html>
